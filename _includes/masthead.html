{% include base_path %}

<div class="masthead">
  <div class="masthead__inner-wrap">
    <div class="masthead__menu">
      <nav id="site-nav" class="greedy-nav">
        <button><div class="navicon"></div></button>
        <ul class="visible-links">
          <li class="masthead__menu-item masthead__menu-item--lg">
            <a href="{{ base_path }}/">
              <span data-i18n-zh="王以俨 / 个人主页" data-i18n-en="Yiyan Wang / Homepage">王以俨 / 个人主页</span>
            </a>
          </li>
          {% for link in site.data.navigation.main %}
            {% if link.url contains 'http' %}
              {% assign domain = '' %}
              {% else %}
              {% assign domain = base_path %}
            {% endif %}
            <li class="masthead__menu-item">
              <a href="{{ domain }}{{ link.url }}">
                <span data-i18n-zh="{{ link.title_zh | default: link.title }}" data-i18n-en="{{ link.title_en | default: link.title }}">{{ link.title_zh | default: link.title }}</span>
              </a>
            </li>
          {% endfor %}
        </ul>
        <ul class="hidden-links hidden"></ul>
      </nav>
      <div class="site-controls">
        <button class="site-control-btn" type="button" data-theme-toggle title="Toggle Theme">🌗</button>
        <button class="site-control-btn is-active" type="button" data-lang-switch="zh">中</button>
        <button class="site-control-btn" type="button" data-lang-switch="en">EN</button>
      </div>
    </div>
  </div>
</div>
