<a href="/sitemap/">Sitemap</a>
<script>
  document.addEventListener("DOMContentLoaded", function () {
    var root = document.documentElement;
    var themeButton = document.querySelector("[data-theme-toggle]");
    var darkQuery = window.matchMedia("(prefers-color-scheme: dark)");

    function updateThemeButton(theme) {
      if (!themeButton) return;
      themeButton.textContent = theme === "dark" ? "🌙" : "☀️";
      themeButton.setAttribute("aria-label", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
      themeButton.setAttribute("title", theme === "dark" ? "Switch to light mode" : "Switch to dark mode");
    }

    function resolveTheme(pref) {
      if (pref === "dark" || pref === "light") return pref;
      return darkQuery.matches ? "dark" : "light";
    }

    function setTheme(pref, persist) {
      var nextTheme = resolveTheme(pref);
      root.setAttribute("data-theme", nextTheme);
      updateThemeButton(nextTheme);
      if (persist) localStorage.setItem("site-theme", nextTheme);
    }

    var savedTheme = localStorage.getItem("site-theme");
    setTheme(savedTheme || "system", false);

    if (!savedTheme) {
      if (darkQuery.addEventListener) {
        darkQuery.addEventListener("change", function () { setTheme("system", false); });
      } else if (darkQuery.addListener) {
        darkQuery.addListener(function () { setTheme("system", false); });
      }
    }

    if (themeButton) {
      themeButton.addEventListener("click", function () {
        var current = root.getAttribute("data-theme") || resolveTheme("system");
        setTheme(current === "dark" ? "light" : "dark", true);
      });
    }

    var langButtons = document.querySelectorAll("[data-lang-switch]");
    var i18nNodes = document.querySelectorAll("[data-i18n-zh][data-i18n-en]");
    var zhNodes = document.querySelectorAll(".lang-zh");
    var enNodes = document.querySelectorAll(".lang-en");

    function setLanguage(lang) {
      var nextLang = lang === "en" ? "en" : "zh";
      document.documentElement.setAttribute("data-lang", nextLang);
      localStorage.setItem("site-lang", nextLang);

      langButtons.forEach(function (btn) {
        btn.classList.toggle("is-active", btn.getAttribute("data-lang-switch") === nextLang);
      });

      i18nNodes.forEach(function (node) {
        var text = node.getAttribute(nextLang === "en" ? "data-i18n-en" : "data-i18n-zh");
        if (text) node.textContent = text;
      });

      zhNodes.forEach(function (node) { node.hidden = nextLang !== "zh"; });
      enNodes.forEach(function (node) { node.hidden = nextLang !== "en"; });
    }

    if (langButtons.length) {
      var savedLang = localStorage.getItem("site-lang");
      var browserLang = (navigator.language || "").toLowerCase();
      var initialLang = savedLang || (browserLang.indexOf("zh") === 0 ? "zh" : "en");
      setLanguage(initialLang);

      langButtons.forEach(function (button) {
        button.addEventListener("click", function () {
          setLanguage(button.getAttribute("data-lang-switch"));
        });
      });
    } else {
      document.documentElement.setAttribute("data-lang", "zh");
    }

    var nodes = document.querySelectorAll(".reveal-on-scroll");
    if (nodes.length) {
      if (!("IntersectionObserver" in window)) {
        nodes.forEach(function (node) { node.classList.add("is-visible"); });
      } else {
        var observer = new IntersectionObserver(function (entries, ob) {
          entries.forEach(function (entry) {
            if (entry.isIntersecting) {
              entry.target.classList.add("is-visible");
              ob.unobserve(entry.target);
            }
          });
        }, { threshold: 0.15 });
        nodes.forEach(function (node) { observer.observe(node); });
      }
    }

    var filterButtons = document.querySelectorAll(".project-filter-btn");
    var cards = document.querySelectorAll(".project-card[data-tags]");
    var emptyHint = document.getElementById("project-empty");

    if (!filterButtons.length || !cards.length) return;

    function applyFilter(filterKey) {
      var shown = 0;
      cards.forEach(function (card) {
        var tags = card.getAttribute("data-tags") || "";
        var matched = filterKey === "all" || tags.indexOf(filterKey) !== -1;
        card.classList.toggle("is-filter-hidden", !matched);
        if (matched) shown += 1;
      });
      if (emptyHint) emptyHint.hidden = shown > 0;
    }

    filterButtons.forEach(function (button) {
      button.addEventListener("click", function () {
        var filterKey = button.getAttribute("data-project-filter");
        filterButtons.forEach(function (btn) {
          btn.classList.toggle("is-active", btn === button);
        });
        applyFilter(filterKey);
      });
    });

    applyFilter("all");
  });
</script>
<!-- end custom footer snippets -->
